syntax = "proto3";

package hatriecache.v1;

option go_package = "hatrie_cache/internal/gen/hatriecache/v1;hatriecachev1";

service CacheService {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc Stats(StatsRequest) returns (StatsResponse);
  rpc Entries(EntriesRequest) returns (EntriesResponse);
  rpc Command(CommandRequest) returns (CommandResponse);
  rpc CommandStream(stream CommandRequest) returns (stream CommandResponse);
  rpc CommandBatchStream(stream CommandBatchRequest) returns (stream CommandBatchResponse);
  rpc ScalarBatchStream(stream ScalarBatchRequest) returns (stream ScalarBatchResponse);
  rpc StructuredBatchStream(stream StructuredBatchRequest) returns (stream StructuredBatchResponse);
  rpc Snapshot(SnapshotRequest) returns (CommandResponse);
  rpc Replication(ReplicationRequest) returns (ReplicationResponse);
  rpc ReplicationStream(stream ReplicationStreamBatch) returns (stream ReplicationStreamAck);
  rpc Topology(TopologyRequest) returns (TopologyResponse);
  rpc UpdateTopology(UpdateTopologyRequest) returns (TopologyResponse);
  rpc Election(ElectionRequest) returns (ElectionResponse);
  rpc UpdateElection(UpdateElectionRequest) returns (ElectionResponse);
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string node = 2;
  int64 uptime_seconds = 3;
  uint64 memory_bytes = 4;
  uint64 disk_spill_bytes = 5;
  int32 cleaners_running = 6;
}

message StatsRequest {}

message StatsResponse {
  uint64 reads = 1;
  uint64 hits = 2;
  uint64 misses = 3;
  uint64 writes = 4;
  uint64 deletes = 5;
  uint64 expirations = 6;
  int64 last_hit_unix_nano = 7;
  int64 last_miss_unix_nano = 8;
  int64 last_write_unix_nano = 9;
  double hit_rate = 10;
  double cumulative_hit_rate = 11;
}

message EntriesRequest {
  string prefix = 1;
  uint64 limit = 2;
  optional string after_key = 3;
}

message Entry {
  string key = 1;
  string type = 2;
  optional int64 ttl_millis = 3;
  bool on_disk = 4;
  int64 size_bytes = 5;
  string value_preview = 6;
}

message EntriesResponse {
  repeated Entry entries = 1;
  uint64 limit = 2;
  bool has_more = 3;
  string after_key = 4;
  string next_after_key = 5;
}

message CommandRequest {
  string command = 1;
  string key = 2;
  string value = 3;
  repeated string values = 4;
  string subkey = 5;
  map<string, string> pairs = 6;
  optional int64 ttl_seconds = 7;
  optional int64 unix_seconds = 8;
  optional int64 priority = 9;
  repeated CommandRequest batch = 10;
  bytes binary_value = 11;
}

message CommandResponse {
  bool ok = 1;
  string message = 2;
  string value = 3;
  repeated CommandResponse responses = 4;
}

message CommandBatchRequest {
  uint64 batch_id = 1;
  repeated CommandRequest requests = 2;
}

message CommandBatchResponse {
  uint64 batch_id = 1;
  repeated CommandResponse responses = 2;
  bool ok = 3;
  string message = 4;
}

// Scalar batches use columnar fields so one protobuf message can carry many
// commands without allocating one request and response object per operation.
enum ScalarCommand {
  SCALAR_COMMAND_UNSPECIFIED = 0;
  SCALAR_COMMAND_GET = 1;
  SCALAR_COMMAND_EXISTS = 2;
  SCALAR_COMMAND_SET_STRING = 3;
  SCALAR_COMMAND_SET_COUNTER = 4;
  SCALAR_COMMAND_INCREMENT = 5;
  SCALAR_COMMAND_DELETE = 6;
}

enum ScalarResultStatus {
  SCALAR_RESULT_STATUS_UNSPECIFIED = 0;
  SCALAR_RESULT_STATUS_OK = 1;
  SCALAR_RESULT_STATUS_NOT_FOUND = 2;
  SCALAR_RESULT_STATUS_INVALID_KEY = 3;
  SCALAR_RESULT_STATUS_INVALID_ARGUMENT = 4;
  SCALAR_RESULT_STATUS_COUNTER_OVERFLOW = 5;
  SCALAR_RESULT_STATUS_INTERNAL_ERROR = 6;
}

enum ScalarValueKind {
  SCALAR_VALUE_KIND_NONE = 0;
  SCALAR_VALUE_KIND_BYTES = 1;
  SCALAR_VALUE_KIND_INTEGER = 2;
  SCALAR_VALUE_KIND_BOOLEAN = 3;
}

// Structured batches cover collection operations without allocating one
// CommandRequest and CommandResponse protobuf object per operation.
enum StructuredCommand {
  STRUCTURED_COMMAND_UNSPECIFIED = 0;
  STRUCTURED_COMMAND_PUT_MAP = 1;
  STRUCTURED_COMMAND_PEEK_MAP = 2;
  STRUCTURED_COMMAND_TAKE_MAP = 3;
  STRUCTURED_COMMAND_PUSH_SLICE = 4;
  STRUCTURED_COMMAND_POP_SLICE = 5;
  STRUCTURED_COMMAND_SHIFT_SLICE = 6;
  STRUCTURED_COMMAND_HEAD_SLICE = 7;
  STRUCTURED_COMMAND_TAIL_SLICE = 8;
  STRUCTURED_COMMAND_ADD_SET = 9;
  STRUCTURED_COMMAND_REMOVE_SET = 10;
  STRUCTURED_COMMAND_HAS_SET = 11;
  STRUCTURED_COMMAND_GET_SET = 12;
  STRUCTURED_COMMAND_PUSH_PRIORITY = 13;
  STRUCTURED_COMMAND_PEEK_PRIORITY = 14;
  STRUCTURED_COMMAND_POP_PRIORITY = 15;
  STRUCTURED_COMMAND_GET_PRIORITY = 16;
}

message SnapshotRequest {}

message ReplicationRequest {
  bool sync = 1;
  string prefix = 2;
}

message ReplicationResponse {
  string command = 1;
  string key = 2;
  uint64 entries = 3;
  bool queued = 4;
  bool skipped = 5;
  string reason = 6;
  ReplicationQueue queue = 7;
  repeated ReplicationTarget targets = 8;
  int64 started_at_unix_nano = 9;
  int64 finished_at_unix_nano = 10;
  int64 duration_millis = 11;
  string health = 12;
  int32 health_score = 13;
  string health_reason = 14;
}

message ReplicationStreamBatch {
  string source = 1;
  uint64 sequence = 2;
  string topology_fingerprint = 3;
  repeated string keys = 4;
  repeated bytes binary_values = 5;
}

message ReplicationStreamAck {
  uint64 sequence = 1;
  uint64 entries = 2;
  bool ok = 3;
  string message = 4;
}

message ReplicationQueue {
  bool enabled = 1;
  int64 depth = 2;
  int64 capacity = 3;
  uint64 enqueued = 4;
  uint64 dropped = 5;
  uint64 attempts = 6;
  uint64 successes = 7;
  uint64 failures = 8;
  uint64 retried = 9;
  bool closed = 10;
  bool durable_backlog = 11;
}

message ReplicationTarget {
  string node = 1;
  string key = 2;
  string address = 3;
  bool ok = 4;
  int32 status = 5;
  string error = 6;
}

message TopologyRequest {
  string key = 1;
}

message UpdateTopologyRequest {
  ClusterTopology topology = 1;
}

message TopologyResponse {
  bool ok = 1;
  string message = 2;
  ClusterTopology topology = 3;
  TopologyRoute route = 4;
}

message ClusterTopology {
  uint64 version = 1;
  string mode = 2;
  uint32 bucket_count = 3;
  repeated TopologyBucketRange bucket_ranges = 4;
  string self = 5;
  repeated TopologyNode nodes = 6;
  repeated TopologyShard shards = 7;
}

message TopologyNode {
  string id = 1;
  string address = 2;
  string role = 3;
  string grpc_address = 4;
  bool maintenance = 5;
  string maintenance_reason = 6;
  string maintenance_since = 7;
}

message TopologyShard {
  uint32 id = 1;
  string primary = 2;
  repeated string replicas = 3;
}

message TopologyBucketRange {
  uint32 start = 1;
  uint32 end = 2;
  uint32 shard = 3;
}

message TopologyRoute {
  string key = 1;
  string mode = 2;
  optional uint32 bucket = 3;
  TopologyShard shard = 4;
  repeated string owners = 5;
}

message ElectionRequest {
  string key = 1;
}

message UpdateElectionRequest {
  string node = 1;
  optional bool online = 2;
}

message ElectionResponse {
  bool ok = 1;
  string message = 2;
  ElectionStatus status = 3;
  ElectionKeyRoute route = 4;
}

message ElectionStatus {
  int64 timeout_millis = 1;
  repeated ElectionNodeStatus nodes = 2;
  repeated ElectionLeader leaders = 3;
}

message ElectionNodeStatus {
  string id = 1;
  bool online = 2;
  string reason = 3;
  int64 last_seen_unix_nano = 4;
}

message ElectionLeader {
  uint32 shard = 1;
  string leader = 2;
  bool available = 3;
  string primary = 4;
  repeated string candidates = 5;
}

message ElectionKeyRoute {
  string key = 1;
  TopologyRoute route = 2;
  ElectionLeader leader = 3;
}

message ScalarBatchRequest {
  uint64 batch_id = 1;
  repeated ScalarCommand operations = 2;
  repeated string keys = 3;
  // One value for every SET_STRING operation, in operation order.
  repeated bytes string_values = 4;
  // One value for every SET_COUNTER or INCREMENT operation, in operation order.
  repeated sint64 integer_values = 5;
}

message ScalarBatchResponse {
  uint64 batch_id = 1;
  bool ok = 2;
  string error = 3;
  repeated ScalarResultStatus statuses = 4;
  repeated ScalarValueKind value_kinds = 5;
  // Integer and boolean results, in operation order for their corresponding kind.
  repeated sint64 integer_values = 6;
  // Byte results are concatenated; value_ends contains cumulative end offsets.
  bytes values = 7;
  repeated uint32 value_ends = 8;
  // Unexpected per-command errors are sparse and paired by position.
  repeated uint32 error_indexes = 9;
  repeated string errors = 10;
}

message StructuredBatchRequest {
  uint64 batch_id = 1;
  repeated StructuredCommand operations = 2;
  repeated string keys = 3;
  // One subkey for every map operation, in operation order.
  repeated string subkeys = 4;
  // One value for every operation that consumes a value, in operation order.
  repeated bytes values = 5;
  // One priority for every PUSH_PRIORITY operation, in operation order.
  repeated sint64 priorities = 6;
}

message StructuredBatchResponse {
  uint64 batch_id = 1;
  bool ok = 2;
  string error = 3;
  repeated ScalarResultStatus statuses = 4;
  repeated ScalarValueKind value_kinds = 5;
  // Integer and boolean results, in operation order for their corresponding kind.
  repeated sint64 integer_values = 6;
  // Byte results are concatenated; value_ends contains cumulative end offsets.
  bytes values = 7;
  repeated uint32 value_ends = 8;
  // Unexpected per-command errors are sparse and paired by position.
  repeated uint32 error_indexes = 9;
  repeated string errors = 10;
}
