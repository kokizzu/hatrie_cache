name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  config:
    name: Config
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Verify CI and deployment config
        run: make verify-ci
        env:
          CI_VERIFY_DOCKER_COMPOSE: "1"

  go:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Verify Go
        run: make verify-go

      - name: Benchmark smoke
        run: make bench-ci-smoke

  c-and-ops:
    name: C and Ops
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Verify C
        run: make verify-c

      - name: Verify ops smoke tests
        run: make verify-ops

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: svelte-mpa/pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable

      - name: Install frontend dependencies
        run: make frontend-install

      - name: Verify frontend
        run: make verify-frontend

  docker:
    name: Docker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production image
        run: make docker-build DOCKER_IMAGE=hatrie-cache:ci
